<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web IDE</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; }
        h1 { color: #333; }
        .toolbar { margin-bottom: 15px; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 4px; }
        select, button, input { padding: 8px; font-size: 14px; margin-right: 10px; }
        button { background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #editor { height: 400px; width: 100%; border: 1px solid #ddd; border-radius: 4px; }
        #log { margin-top: 15px; height: 150px; width: 100%; background: #222; color: #0f0; font-family: monospace; padding: 10px; box-sizing: border-box; overflow-y: auto; border-radius: 4px; }
        #progressContainer { width: 100%; background-color: #e0e0e0; border-radius: 4px; margin-top: 10px; display: none; }
        #progressBar { width: 0%; height: 20px; background-color: #28a745; border-radius: 4px; transition: width 0.4s; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>

    <h1>Web IDE</h1>
    
    <div class="toolbar">
        <label for="boardSelect">Board:</label>
        <select id="boardSelect">
            <option value="arduino:avr:uno">Arduino Uno</option>
            <option value="esp32:esp32:esp32s3">ESP32-S3</option>
        </select>
        
        <button id="compileBtn">🔨 Compile</button>
        <button id="uploadBtn" style="background-color: #28a745;" disabled>⚡ Upload</button>
    </div>

    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>

    <div id="editor"></div>

    <div id="log">Console ready...</div>

    <script>
        let editor;
        let compiledFirmware = null;

        const ideLog = document.getElementById('log');
        const compileBtn = document.getElementById('compileBtn');
        const uploadBtn = document.getElementById('uploadBtn');

        // Initialize Monaco Editor
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: "void setup() {\n  // put your setup code here, to run once:\n\n}\n\nvoid loop() {\n  // put your main code here, to run repeatedly:\n\n}",
                language: 'cpp',
                theme: 'vs-dark'
            });
        });

        // --- COMPILE LOGIC ---
        compileBtn.addEventListener('click', async () => {
            const code = editor.getValue();
            const board = document.getElementById('boardSelect').value;
            
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            
            ideLog.innerText = `Sending code to compilation server for ${board}...\n`;
            
            compileBtn.disabled = true;
            uploadBtn.disabled = true;
            
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.style.backgroundColor = '#28a745';
            let progress = 0;
            
            const progressInterval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 10; 
                    if (progress > 90) progress = 90; 
                    progressBar.style.width = `${progress}%`;
                }
            }, 500); 

            try {
                // *** REPLACE WITH YOUR REAL RENDER URL ***
                const response = await fetch('https://YOUR-APP-NAME.onrender.com/compile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Just sending the code and the board now!
                    body: JSON.stringify({ code: code, board: board }) 
                });
                
                const result = await response.json();

                clearInterval(progressInterval); 
                progressBar.style.width = '100%'; 

                if (result.success) {
                    ideLog.innerText += "Success! Firmware compiled successfully.\n";
                    compiledFirmware = result.binaryData; 
                    uploadBtn.disabled = false; 
                } else {
                    ideLog.innerText += `\nCompilation Error: ${result.error}\n${result.details}`;
                    progressBar.style.backgroundColor = '#dc3545';
                }

            } catch (error) {
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                progressBar.style.backgroundColor = '#dc3545';
                ideLog.innerText += `\nNetwork Error: Could not reach the server. ${error.message}`;
            } finally {
                compileBtn.disabled = false;
                
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    progressBar.style.width = '0%';
                    progressBar.style.backgroundColor = '#28a745'; 
                }, 2000);
            }
        });

        // --- UPLOAD LOGIC ---
        uploadBtn.addEventListener('click', async () => {
            if (!compiledFirmware) return;
            ideLog.innerText += "Initiating upload sequence...\n(Web Serial logic goes here)\n";
            // Your future Web Serial API code will hook in here!
        });
    </script>
</body>
</html>
