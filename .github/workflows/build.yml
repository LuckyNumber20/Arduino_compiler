name: Build Windows EXE

on:
  push:
    branches:
      - main  # Triggers the build every time you push code to main

jobs:
  release:
    runs-on: windows-latest  # Tells GitHub to launch a temporary Windows PC in the cloud

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Package Application into EXE
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Executable
          path: dist/*.exe  # Grabs the compiled .exe file
